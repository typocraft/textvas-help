<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Textvas - User Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg1:#111113;--bg2:#1a1a1e;--bg3:#242428;--accent:#bcec15;--text1:#e8e8e8;--text2:rgba(232,232,232,0.65);--font:'Noto Sans JP',sans-serif;--font-en:'Orbitron',sans-serif}
html{scroll-behavior:smooth}
body{background:var(--bg1);color:var(--text1);font-family:var(--font);font-size:14px;line-height:1.7}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* Sidebar */
.sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--bg2);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sidebar-logo{font-family:var(--font-en);font-size:16px;font-weight:900;letter-spacing:0.1em;padding:20px 20px 6px}
.sidebar-logo span{color:var(--accent)}
.sidebar-sub{font-size:10px;color:var(--text1);padding:0 20px 16px;font-weight:700}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;flex:1}
.sidebar-nav a{display:block;font-size:12px;font-weight:700;color:var(--text2);padding:8px 12px;border-radius:6px;transition:all 0.15s}
.sidebar-nav a:hover{color:var(--text1);background:rgba(255,255,255,0.04);text-decoration:none}
.sidebar-nav a.active{color:var(--accent);background:rgba(188,236,21,0.08)}
.sidebar-bottom{padding:12px 20px;border-top:1px solid rgba(255,255,255,0.06)}

/* Main content */
.main{margin-left:220px}

/* Hero */
.hero{padding:48px 60px 40px;max-width:1200px}
.hero h1{font-family:var(--font-en);font-size:28px;font-weight:900;letter-spacing:0.08em;margin-bottom:8px}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--text1);font-size:13px}

/* Container */
.container{max-width:1200px;padding:0 60px 80px}

/* Section */
.section{margin-bottom:48px}
.section-title{font-family:var(--font-en);font-size:20px;font-weight:900;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';display:inline-block;width:3px;height:20px;background:var(--accent);border-radius:2px}
.section-desc{color:var(--text1);font-size:13px;margin-bottom:20px;line-height:2.0}

/* Shortcut table */
.sc-table{width:100%;border-collapse:collapse}
.sc-table th{text-align:left;font-size:11px;color:var(--text1);font-weight:700;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sc-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px}
.sc-table tr:hover{background:rgba(255,255,255,0.02)}
kbd{display:inline;background:none;border:none;border-radius:0;padding:0;font-size:13px;font-family:var(--font);font-weight:700;color:var(--text1);white-space:nowrap}

/* Feature card */
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.feat-card{background:var(--bg2);border-radius:10px;padding:16px 18px;border:1px solid rgba(255,255,255,0.04);transition:border-color 0.15s}
.feat-card:hover{border-color:rgba(188,236,21,0.2)}
.feat-card h3{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.feat-card h3 .icon{font-size:15px}
.feat-card p{font-size:13px;color:var(--text1);line-height:1.6}

/* Simple content */
.simple-content{display:flex;flex-direction:column;gap:4px}
.simple-content h4{font-size:14px;font-weight:700;margin-top:20px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.08)}
.simple-content p{font-size:13px;color:var(--text1);line-height:2.0;margin-top:4px;max-width:800px}

/* Steps */
.steps{display:flex;flex-direction:column;gap:10px}
.step{display:flex;gap:14px;align-items:flex-start;background:var(--bg2);border-radius:10px;padding:14px 18px;border:1px solid rgba(255,255,255,0.04)}
.step-num{background:var(--accent);color:var(--bg1);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.step-body h4{font-size:13px;font-weight:700;margin-bottom:2px}
.step-body p{font-size:13px;color:var(--text1);line-height:1.6}

/* Color swatches */
.preset-row{display:flex;gap:10px;flex-wrap:wrap}
.preset-swatch{width:40px;height:40px;border-radius:8px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:8px;font-weight:700;color:rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.06);transition:transform 0.1s}
.preset-swatch:hover{transform:scale(1.1)}
.preset-label{text-align:center;font-size:9px;color:var(--text2);margin-top:4px}

/* Tips */
.tip{background:rgba(188,236,21,0.06);border:1px solid rgba(188,236,21,0.15);border-radius:10px;padding:14px 18px;margin:12px 0;font-size:12px;line-height:1.7}
.tip::before{content:'TIP';display:inline-block;background:var(--accent);color:var(--bg1);font-size:9px;font-weight:900;padding:1px 6px;border-radius:3px;margin-right:8px}

/* Help image */
.help-img{width:100%;max-width:820px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);margin:16px 0}
.help-img-sm{max-width:380px}

/* Footer */
.footer{text-align:center;padding:32px 40px;border-top:1px solid rgba(255,255,255,0.06);color:var(--text2);font-size:11px}

/* Language toggle */
.lang-toggle{display:flex;gap:2px}
.lang-btn{border:1px solid rgba(255,255,255,0.15);background:none;color:var(--text2);font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.lang-btn:hover{background:rgba(255,255,255,0.08);color:var(--text1);border-color:rgba(255,255,255,0.3)}
.lang-btn.active{background:var(--accent);color:var(--bg1);border-color:var(--accent)}

@media(max-width:768px){
  .sidebar{position:relative;width:100%;height:auto;border-right:none;border-bottom:1px solid rgba(255,255,255,0.06)}
  .sidebar-nav{flex-direction:row;flex-wrap:wrap;padding:0 10px 10px}
  .main{margin-left:0}
  .feat-grid{grid-template-columns:1fr}
  .hero h1{font-size:22px}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo"><span>T</span>extvas</div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px 16px">
    <div class="sidebar-sub i18n" style="padding:0" data-ja="ユーザーガイド" data-en="User Guide"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ja')">JP</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a href="#install" class="i18n nav-link active" data-ja="インストール" data-en="Installation"></a>
    <a href="#start" class="i18n nav-link" data-ja="基本操作" data-en="Basics"></a>
    <a href="#canvas" class="i18n nav-link" data-ja="ボード操作" data-en="Board Controls"></a>
    <a href="#boards" class="i18n nav-link" data-ja="ボードタブ管理" data-en="Board Tabs"></a>
    <a href="#features" class="i18n nav-link" data-ja="便利な機能" data-en="Features"></a>
    <a href="#save" class="i18n nav-link" data-ja="保存" data-en="Save"></a>
    <a href="#settings" class="i18n nav-link" data-ja="設定" data-en="Settings"></a>
    <a href="#file" class="i18n nav-link" data-ja="ファイル操作" data-en="Files"></a>
    <a href="#shortcuts" class="i18n nav-link" data-ja="ショートカット" data-en="Shortcuts"></a>
    <a href="#faq" class="i18n nav-link" data-ja="よくある質問" data-en="FAQ"></a>
    <a href="#contact" class="i18n nav-link" data-ja="お問い合わせ" data-en="Contact"></a>
  </nav>
</div>

<div class="main">

<div class="hero">
  <h1><span>Textvas</span> User Guide</h1>
  <p class="i18n" data-ja="テキストと画像を自由に配置・整理できるノートアプリ" data-en="A note app for freely arranging and organizing text and images"></p>
  <img src="images/hero_ja.jpg" alt="Textvas" class="help-img" id="hero-img" data-img-ja="images/hero_ja.jpg" data-img-en="images/hero_en.jpg">
</div>

<div class="container">

<!-- 0. Installation -->
<div class="section" id="install">
  <h2 class="section-title i18n" data-ja="インストール" data-en="Installation"></h2>
  <img src="images/install_ja.jpg" alt="Install" class="help-img" data-img-ja="images/install_ja.jpg" data-img-en="images/install_en.jpg">
  <div class="simple-content">
    <h4 class="i18n" data-ja="インストーラーを実行" data-en="Run the Installer"></h4>
    <p class="i18n" data-ja="インストーラーを実行します。言語選択後、利用規約に同意してインストールを進めてください。デフォルトでは C:\Program Files\Textvas にインストールされます。" data-en="Run the installer. Select your language, accept the terms, and proceed. By default, Textvas is installed to C:\Program Files\Textvas."></p>
    <h4 class="i18n" data-ja="起動" data-en="Launch"></h4>
    <p class="i18n" data-ja="デスクトップのショートカット、またはスタートメニューから起動します。初回起動時から7日間、すべての機能を無料でお試しいただけます。" data-en="Launch from the desktop shortcut or Start menu. All features are available free for 7 days from the first launch."></p>
    <h4 class="i18n" data-ja="ライセンス認証" data-en="License Activation"></h4>
    <p class="i18n" data-ja="継続利用にはライセンスキーが必要です。設定 → ライセンスタブ、または試用期限画面からシリアルキーを入力してください。" data-en="A license key is required for continued use. Enter your serial key from Settings → License tab, or from the trial expiration screen."></p>
  </div>
</div>

<!-- 1. Basics -->
<div class="section" id="start">
  <h2 class="section-title i18n" data-ja="基本操作" data-en="Basics"></h2>
  <img src="images/basics_ja.jpg" alt="Basics" class="help-img" data-img-ja="images/basics_ja.jpg" data-img-en="images/basics_en.jpg">
  <div class="simple-content">
    <h4 class="i18n" data-ja="プロジェクト名・ボード名" data-en="Project & Board Name"></h4>
    <p class="i18n" data-ja="画面上部でプロジェクト名とボード名を入力できます。プロジェクト名はファイル全体の名前、ボード名は各ボードの名前です。" data-en="Enter the project name and board name at the top of the screen. The project name applies to the entire file, and the board name applies to each board."></p>
    <h4 class="i18n" data-ja="テキストを作る" data-en="Create Text"></h4>
    <p class="i18n" data-ja="ボード上でダブルクリック、またはTキーを押すとテキストが作成されます。" data-en="Double-click on the board or press T to create text."></p>
    <h4 class="i18n" data-ja="テキストを編集する" data-en="Edit Text"></h4>
    <p class="i18n" data-ja="ダブルクリックで編集モードに入ります。ボードの空白部分をクリックすると編集を終了します。" data-en="Double-click to enter edit mode. Click on an empty area of the board to finish editing."></p>
    <h4 class="i18n" data-ja="リッチテキスト" data-en="Rich Text"></h4>
    <p class="i18n" data-ja="編集モード中にテキストを選択すると、色・下線・フォント個別指定が可能です。" data-en="Select text in edit mode to apply color, underline, and individual font."></p>
    <h4 class="i18n" data-ja="移動・リサイズ・回転" data-en="Move, Resize & Rotate"></h4>
    <p class="i18n" data-ja="ドラッグで移動。端をドラッグでリサイズ。回転ハンドルで回転できます。複数選択してCtrl+矢印キーで整列も可能。" data-en="Drag to move. Drag edges to resize. Use the rotation handle to rotate. Select multiple and Ctrl+Arrow to align."></p>
    <h4 class="i18n" data-ja="テキストサイズ" data-en="Text Sizes"></h4>
    <p class="i18n" data-ja="XS / S / M / L / XL の5段階。選択中にツールバーから変更できます。デフォルトはMです。" data-en="5 levels: XS / S / M / L / XL. Change from the toolbar while selected. Default is M."></p>
  </div>
</div>

<!-- 2. Board Controls -->
<div class="section" id="canvas">
  <h2 class="section-title i18n" data-ja="ボード操作" data-en="Board Controls"></h2>

  <h3 style="font-size:13px;color:var(--text1);margin:16px 0 8px" class="i18n" data-ja="基本操作" data-en="Basic Controls"></h3>
  <table class="sc-table">
    <tr><th class="i18n" data-ja="操作" data-en="Action"></th><th class="i18n" data-ja="方法" data-en="How"></th></tr>
    <tr><td class="i18n" data-ja="パン（移動）" data-en="Pan"></td><td class="i18n" data-ja="中ボタンドラッグ / Space+左ドラッグ" data-en="Middle-click drag / Space+Left drag"></td></tr>
    <tr><td class="i18n" data-ja="ズーム" data-en="Zoom"></td><td><kbd>Ctrl</kbd>+<span class="i18n" data-ja="ホイール" data-en="Wheel"></span></td></tr>
    <tr><td class="i18n" data-ja="スクロール（縦）" data-en="Scroll (Vertical)"></td><td class="i18n" data-ja="ホイール" data-en="Wheel"></td></tr>
    <tr><td class="i18n" data-ja="スクロール（横）" data-en="Scroll (Horizontal)"></td><td class="i18n" data-ja="Shift+ホイール" data-en="Shift+Wheel"></td></tr>
    <tr><td class="i18n" data-ja="範囲選択" data-en="Lasso Select"></td><td class="i18n" data-ja="空白エリアで左ドラッグ" data-en="Left-drag on empty area"></td></tr>
    <tr><td class="i18n" data-ja="右クリックメニュー" data-en="Context Menu"></td><td class="i18n" data-ja="ボード上で右クリック" data-en="Right-click on board"></td></tr>
  </table>

  <h3 style="font-size:13px;color:var(--text1);margin:24px 0 8px" class="i18n" data-ja="テキスト・画像" data-en="Text & Images"></h3>
  <div class="simple-content">
    <h4 class="i18n" data-ja="テキスト" data-en="Text"></h4>
    <p class="i18n" data-ja="ダブルクリックまたはTキーで作成。5段階のサイズ（XS/S/M/L/XL）、テキスト色・枠線・下線・背景色をカスタマイズ可能。" data-en="Create with double-click or T key. 5 sizes (XS/S/M/L/XL), customizable text color, border, underline, and background."></p>

    <h4 class="i18n" data-ja="画像" data-en="Image"></h4>
    <p class="i18n" data-ja="画像ファイルをドラッグ&ドロップ、またはCtrl+Vでクリップボードから貼り付け。自由リサイズ・回転が可能。" data-en="Drag & drop image files or paste from clipboard with Ctrl+V. Free resize and rotation."></p>

    <h4 class="i18n" data-ja="接続線" data-en="Connections"></h4>
    <p class="i18n" data-ja="Lキーで接続モード開始。テキスト同士を線でつないで関係性を可視化。ラベル追加も可能。" data-en="Press L to start connection mode. Link elements with lines to visualize relationships. Labels can be added."></p>

    <h4 class="i18n" data-ja="複数選択" data-en="Multi-Select"></h4>
    <p class="i18n" data-ja="範囲ドラッグまたはCtrl+Aで全選択。サイズ・色・装飾を一括変更可能。" data-en="Lasso drag or Ctrl+A to select all. Batch change size, color, and decorations."></p>
  </div>

</div>

<!-- 4. Boards -->
<div class="section" id="boards">
  <h2 class="section-title i18n" data-ja="ボードタブ管理" data-en="Board Tab Management"></h2>
  <img src="images/tabs_ja.jpg" alt="Board Tabs" class="help-img help-img-sm" data-img-ja="images/tabs_ja.jpg" data-img-en="images/tabs_en.jpg">

  <div class="simple-content">
    <h4 class="i18n" data-ja="タブの追加・複製" data-en="Add & Duplicate Tabs"></h4>
    <p class="i18n" data-ja="サイドバーの＋ボタンまたはタブを右クリックで追加。既存タブの複製も可能。" data-en="Use the + button in sidebar or right-click a tab to add. Existing tabs can be duplicated."></p>

    <h4 class="i18n" data-ja="タブの整理" data-en="Organize Tabs"></h4>
    <p class="i18n" data-ja="タブを右クリックで連番追加・除去、見出し追加、区切り線追加が可能。" data-en="Right-click a tab for numbering, headings, and separator lines."></p>

    <h4 class="i18n" data-ja="タブの色変更" data-en="Tab Colors"></h4>
    <p class="i18n" data-ja="タブを右クリック→「色を変更」でタブごとに色を設定可能。" data-en="Right-click a tab and select 'Change color' to customize its color."></p>

    <h4 class="i18n" data-ja="完了チェック" data-en="Completion Check"></h4>
    <p class="i18n" data-ja="タブのチェックボタンで完了マークを付けられます。" data-en="Mark tabs as complete using the check button."></p>
    <p class="i18n" data-ja="この機能は設定 → その他タブで「ボードの完了チェック」をオンにすると使用できます。" data-en="Enable this feature in Settings → Misc tab by turning on 'Board Done Checkbox'."></p>

    <h4 class="i18n" data-ja="並べ替え" data-en="Reorder"></h4>
    <p class="i18n" data-ja="サイドバーのタブをドラッグで並べ替えできます。" data-en="Drag tabs in the sidebar to reorder."></p>

    <h4 class="i18n" data-ja="テキスト書き出し" data-en="Export Text"></h4>
    <p class="i18n" data-ja="タブを右クリック →「テキストの書き出し」で、ボード内のテキストを.txtファイルとして保存できます。複数タブを選択している場合はひとつのファイルに結合されます。" data-en="Right-click a tab → 'Export Text' to save the board's text as a .txt file. When multiple tabs are selected, they are merged into one file."></p>

    <h4 class="i18n" data-ja="名前の変更" data-en="Rename"></h4>
    <p class="i18n" data-ja="サイドバーでタブを右クリック →「名前を変更」、またはダブルクリックで編集。" data-en="Right-click a tab → 'Rename' in sidebar, or double-click to edit."></p>
  </div>
</div>

<!-- 6. Features -->
<div class="section" id="features">
  <h2 class="section-title i18n" data-ja="便利な機能" data-en="Useful Features"></h2>
  <img src="images/features_ja.jpg" alt="Features" class="help-img" data-img-ja="images/features_ja.jpg" data-img-en="images/features_en.jpg">

  <div class="simple-content">
    <h4 class="i18n" data-ja="接続線" data-en="Connection Lines"></h4>
    <p class="i18n" data-ja="Lキーで接続モードを開始し、テキスト同士を線でつなげます。関係性やフローを可視化できます。線にラベルを追加することも可能です。" data-en="Press L to start connection mode and link elements with lines. Visualize relationships and flows. Labels can be added to lines."></p>

    <h4 class="i18n" data-ja="メモウィンドウ" data-en="Memo Window"></h4>
    <p class="i18n" data-ja="Mキーで作成。ボード上にドラッグ可能な浮遊メモ。最小化・リサイズ対応。" data-en="Press M to create. Floating draggable memo on board. Supports minimize and resize."></p>

    <h4 class="i18n" data-ja="アイコンパレット" data-en="Icon Palette"></h4>
    <p class="i18n" data-ja="Iキーで表示。評価・矢印・タスク・構造・記号などのアイコンをボードに追加。" data-en="Press I to show. Add icons for ratings, arrows, tasks, structure, and symbols to the board."></p>

  </div>
</div>

<!-- Save -->
<div class="section" id="save">
  <h2 class="section-title i18n" data-ja="保存" data-en="Save"></h2>
  <div class="simple-content">
    <h4 class="i18n" data-ja="自動保存" data-en="Auto Save"></h4>
    <p class="i18n" data-ja="設定で間隔を指定すると自動で上書き保存。10秒〜60分まで選択可能。" data-en="Set an interval in settings for automatic saving. Choose from 10 seconds to 60 minutes."></p>

    <h4 class="i18n" data-ja="タイムスタンプバックアップ" data-en="Timestamp Backup"></h4>
    <p class="i18n" data-ja="保存時に日時付きバックアップを自動作成。保持数を設定可能（5〜30個）。" data-en="Automatically create timestamped backups on save. Set retention count (5-30)."></p>

    <h4 class="i18n" data-ja="元に戻す / やり直す" data-en="Undo / Redo"></h4>
    <p class="i18n" data-ja="最大50回まで操作を元に戻せます。Ctrl+Z / Ctrl+Y で操作。" data-en="Undo up to 50 operations. Use Ctrl+Z / Ctrl+Y."></p>
  </div>
</div>

<!-- 7. Settings -->
<div class="section" id="settings">
  <h2 class="section-title i18n" data-ja="設定" data-en="Settings"></h2>
  <img src="images/settings_ja.jpg" alt="Settings" class="help-img" data-img-ja="images/settings_ja.jpg" data-img-en="images/settings_en.jpg">

  <div class="simple-content">
    <h4 class="i18n" data-ja="カラー" data-en="Colors"></h4>

<script>
function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.lang-btn:' + (lang === 'ja' ? 'first-child' : 'last-child')).classList.add('active');
  document.querySelectorAll('.i18n').forEach(el => {
    const text = el.getAttribute('data-' + lang);
    if (!text) return;
    var dots = (text.match(/。/g)||[]).length;
    if (el.tagName === 'P' && dots >= 3) {
      el.innerHTML = text.replace(/。(?!$)/g, '。<br>');
    } else if (el.tagName === 'P' && lang === 'en' && (text.match(/\. /g)||[]).length >= 2) {
      el.innerHTML = text.replace(/\. (?!$)/g, '.<br>');
    } else {
      el.textContent = text;
    }
  });
  document.querySelectorAll('[data-img-' + lang + ']').forEach(function(img) {
    img.src = img.getAttribute('data-img-' + lang);
  });
}

// Scroll spy: highlight active sidebar link
var sections = document.querySelectorAll('.section');
var navLinks = document.querySelectorAll('.nav-link');
document.querySelector('.main').addEventListener('scroll', updateNav);
window.addEventListener('scroll', updateNav);
function updateNav() {
  var scrollY = document.querySelector('.main').scrollTop || window.scrollY;
  var docH = document.documentElement.scrollHeight;
  var winH = window.innerHeight;
  if (scrollY + winH >= docH - 30) {
    navLinks.forEach(function(a) { a.classList.remove('active'); });
    navLinks[navLinks.length - 1].classList.add('active');
    return;
  }
  sections.forEach(function(sec) {
    var top = sec.offsetTop - 100;
    var bottom = top + sec.offsetHeight;
    if (scrollY >= top && scrollY < bottom) {
      navLinks.forEach(function(a) { a.classList.remove('active'); });
      var link = document.querySelector('.nav-link[href="#' + sec.id + '"]');
      if (link) link.classList.add('active');
    }
  });
}
setLang(navigator.language.startsWith('ja') ? 'ja' : 'en');
</script>
