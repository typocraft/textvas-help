<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Textvas - User Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg1:#111113;--bg2:#1a1a1e;--bg3:#242428;--accent:#bcec15;--text1:#e8e8e8;--text2:rgba(232,232,232,0.4);--font:'Noto Sans JP',sans-serif;--font-en:'Orbitron',sans-serif}
html{scroll-behavior:smooth}
body{background:var(--bg1);color:var(--text1);font-family:var(--font);font-size:14px;line-height:1.7}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* Sidebar */
.sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--bg2);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sidebar-logo{font-family:var(--font-en);font-size:16px;font-weight:900;letter-spacing:0.1em;padding:20px 20px 6px}
.sidebar-logo span{color:var(--accent)}
.sidebar-sub{font-size:10px;color:var(--text2);padding:0 20px 16px;font-weight:700}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;flex:1}
.sidebar-nav a{display:block;font-size:12px;font-weight:700;color:var(--text2);padding:8px 12px;border-radius:6px;transition:all 0.15s}
.sidebar-nav a:hover{color:var(--text1);background:rgba(255,255,255,0.04);text-decoration:none}
.sidebar-nav a.active{color:var(--accent);background:rgba(188,236,21,0.08)}
.sidebar-bottom{padding:12px 20px;border-top:1px solid rgba(255,255,255,0.06)}

/* Main content */
.main{margin-left:220px}

/* Hero */
.hero{padding:48px 40px 40px}
.hero h1{font-family:var(--font-en);font-size:28px;font-weight:900;letter-spacing:0.08em;margin-bottom:8px}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--text2);font-size:13px}

/* Container */
.container{max-width:800px;padding:0 40px 80px}

/* Section */
.section{margin-bottom:48px}
.section-title{font-family:var(--font-en);font-size:20px;font-weight:900;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';display:inline-block;width:3px;height:20px;background:var(--accent);border-radius:2px}
.section-desc{color:var(--text2);font-size:12px;margin-bottom:20px}

/* Shortcut table */
.sc-table{width:100%;border-collapse:collapse}
.sc-table th{text-align:left;font-size:11px;color:var(--text2);font-weight:700;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sc-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px}
.sc-table tr:hover{background:rgba(255,255,255,0.02)}
kbd{display:inline-block;background:var(--bg3);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:1px 7px;font-size:11px;font-family:var(--font);font-weight:700;color:var(--accent);white-space:nowrap}

/* Feature card */
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.feat-card{background:var(--bg2);border-radius:10px;padding:16px 18px;border:1px solid rgba(255,255,255,0.04);transition:border-color 0.15s}
.feat-card:hover{border-color:rgba(188,236,21,0.2)}
.feat-card h3{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.feat-card h3 .icon{font-size:15px}
.feat-card p{font-size:11px;color:var(--text2);line-height:1.6}

/* Steps */
.steps{display:flex;flex-direction:column;gap:10px}
.step{display:flex;gap:14px;align-items:flex-start;background:var(--bg2);border-radius:10px;padding:14px 18px;border:1px solid rgba(255,255,255,0.04)}
.step-num{background:var(--accent);color:var(--bg1);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.step-body h4{font-size:13px;font-weight:700;margin-bottom:2px}
.step-body p{font-size:11px;color:var(--text2);line-height:1.6}

/* Color swatches */
.preset-row{display:flex;gap:10px;flex-wrap:wrap}
.preset-swatch{width:40px;height:40px;border-radius:8px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:8px;font-weight:700;color:rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.06);transition:transform 0.1s}
.preset-swatch:hover{transform:scale(1.1)}
.preset-label{text-align:center;font-size:9px;color:var(--text2);margin-top:4px}

/* Tips */
.tip{background:rgba(188,236,21,0.06);border:1px solid rgba(188,236,21,0.15);border-radius:10px;padding:14px 18px;margin:12px 0;font-size:12px;line-height:1.7}
.tip::before{content:'TIP';display:inline-block;background:var(--accent);color:var(--bg1);font-size:9px;font-weight:900;padding:1px 6px;border-radius:3px;margin-right:8px}

/* Footer */
.footer{text-align:center;padding:32px 40px;border-top:1px solid rgba(255,255,255,0.06);color:var(--text2);font-size:11px}

/* Language toggle */
.lang-toggle{display:flex;gap:4px;background:var(--bg3);border-radius:6px;padding:2px}
.lang-btn{border:none;background:none;color:var(--text2);font-size:11px;font-weight:700;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.lang-btn.active{background:var(--accent);color:var(--bg1)}

@media(max-width:768px){
  .sidebar{position:relative;width:100%;height:auto;border-right:none;border-bottom:1px solid rgba(255,255,255,0.06)}
  .sidebar-nav{flex-direction:row;flex-wrap:wrap;padding:0 10px 10px}
  .main{margin-left:0}
  .feat-grid{grid-template-columns:1fr}
  .hero h1{font-size:22px}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo"><span>T</span>extvas</div>
  <div class="sidebar-sub">User Guide</div>
  <nav class="sidebar-nav">
    <a href="#start" class="i18n nav-link active" data-ja="はじめに" data-en="Getting Started"></a>
    <a href="#canvas" class="i18n nav-link" data-ja="キャンバス操作" data-en="Canvas"></a>
    <a href="#cards" class="i18n nav-link" data-ja="テキスト・画像カード" data-en="Cards"></a>
    <a href="#boards" class="i18n nav-link" data-ja="ボード管理" data-en="Boards"></a>
    <a href="#shortcuts" class="i18n nav-link" data-ja="ショートカット" data-en="Shortcuts"></a>
    <a href="#features" class="i18n nav-link" data-ja="便利な機能" data-en="Features"></a>
    <a href="#settings" class="i18n nav-link" data-ja="設定" data-en="Settings"></a>
    <a href="#file" class="i18n nav-link" data-ja="ファイル操作" data-en="Files"></a>
  </nav>
  <div class="sidebar-bottom">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ja')">JP</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div>

<div class="main">

<div class="hero">
  <h1><span>Textvas</span> User Guide</h1>
  <p class="i18n" data-ja="テキスト・画像を自由配置できるキャンバスノートアプリ" data-en="A canvas note app for freely arranging text and images"></p>
</div>

<div class="container">

<!-- 1. Getting Started -->
<div class="section" id="start">
  <h2 class="section-title i18n" data-ja="はじめに" data-en="Getting Started"></h2>
  <p class="section-desc i18n" data-ja="Textvasの基本的な使い方を紹介します。" data-en="Learn the basics of using Textvas."></p>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-body">
        <h4 class="i18n" data-ja="テキストカードを作る" data-en="Create a Text Card"></h4>
        <p class="i18n" data-ja="キャンバス上でダブルクリック、またはTキーを押すとテキストカードが作成されます。" data-en="Double-click on the canvas or press T to create a text card."></p>
      </div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-body">
        <h4 class="i18n" data-ja="テキストを編集する" data-en="Edit Text"></h4>
        <p class="i18n" data-ja="カードをダブルクリックして編集モードに入ります。Escキーで編集を終了します。" data-en="Double-click a card to enter edit mode. Press Escape to finish editing."></p>
      </div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-body">
        <h4 class="i18n" data-ja="カードを移動・整列する" data-en="Move & Align Cards"></h4>
        <p class="i18n" data-ja="カードをドラッグで移動。複数選択してCtrl+矢印キーで整列できます。" data-en="Drag to move cards. Select multiple cards and use Ctrl+Arrow keys to align."></p>
      </div>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <div class="step-body">
        <h4 class="i18n" data-ja="保存する" data-en="Save Your Work"></h4>
        <p class="i18n" data-ja="Ctrl+Sで上書き保存、Ctrl+Shift+Sで別名保存。.txv形式で保存されます。" data-en="Ctrl+S to save, Ctrl+Shift+S to save as. Files are saved in .txv format."></p>
      </div>
    </div>
  </div>
</div>

<!-- 2. Canvas -->
<div class="section" id="canvas">
  <h2 class="section-title i18n" data-ja="キャンバス操作" data-en="Canvas Operations"></h2>
  <p class="section-desc i18n" data-ja="キャンバスの移動・ズーム方法。" data-en="How to navigate and zoom the canvas."></p>
  <table class="sc-table">
    <tr><th class="i18n" data-ja="操作" data-en="Action"></th><th class="i18n" data-ja="方法" data-en="How"></th></tr>
    <tr><td class="i18n" data-ja="パン（移動）" data-en="Pan"></td><td class="i18n" data-ja="中ボタンドラッグ / Space+左ドラッグ" data-en="Middle-click drag / Space+Left drag"></td></tr>
    <tr><td class="i18n" data-ja="ズーム" data-en="Zoom"></td><td><kbd>Ctrl</kbd>+<span class="i18n" data-ja="ホイール" data-en="Wheel"></span></td></tr>
    <tr><td class="i18n" data-ja="範囲選択" data-en="Lasso Select"></td><td class="i18n" data-ja="空白エリアで左ドラッグ" data-en="Left-drag on empty area"></td></tr>
    <tr><td class="i18n" data-ja="右クリックメニュー" data-en="Context Menu"></td><td class="i18n" data-ja="キャンバス上で右クリック" data-en="Right-click on canvas"></td></tr>
  </table>
  <div class="tip i18n" data-ja="ズーム範囲は0.3倍〜3.0倍です。ズームレベルは自動保存されます。" data-en="Zoom range is 0.3x to 3.0x. The zoom level is saved automatically."></div>
</div>

<!-- 3. Cards -->
<div class="section" id="cards">
  <h2 class="section-title i18n" data-ja="テキスト・画像カード" data-en="Text & Image Cards"></h2>
  <p class="section-desc i18n" data-ja="カードの作成・編集・装飾方法。" data-en="How to create, edit, and style cards."></p>

  <div class="feat-grid">
    <div class="feat-card">
      <h3 class="i18n" data-ja="テキストカード" data-en="Text Card"></h3>
      <p class="i18n" data-ja="ダブルクリックまたはTキーで作成。5段階のサイズ（XS/S/M/L/XL）、テキスト色・枠線・下線・背景色をカスタマイズ可能。" data-en="Create with double-click or T key. 5 sizes (XS/S/M/L/XL), customizable text color, border, underline, and background."></p>
    </div>
    <div class="feat-card">
      <h3 class="i18n" data-ja="画像カード" data-en="Image Card"></h3>
      <p class="i18n" data-ja="画像ファイルをドラッグ&ドロップ、またはCtrl+Vでクリップボードから貼り付け。自由リサイズ・回転が可能。" data-en="Drag & drop image files or paste from clipboard with Ctrl+V. Free resize and rotation."></p>
    </div>
    <div class="feat-card">
      <h3 class="i18n" data-ja="接続線" data-en="Connections"></h3>
      <p class="i18n" data-ja="Lキーで接続モード開始。カード間を線でつないで関係性を可視化。ラベル追加も可能。" data-en="Press L to start connection mode. Link cards with lines to visualize relationships. Labels can be added."></p>
    </div>
    <div class="feat-card">
      <h3 class="i18n" data-ja="複数選択" data-en="Multi-Select"></h3>
      <p class="i18n" data-ja="範囲ドラッグまたはCtrl+Aで全選択。テキストサイズ・色・装飾を一括変更可能。" data-en="Lasso drag or Ctrl+A to select all. Batch change size, color, and decorations."></p>
    </div>
  </div>

  <div class="tip i18n" data-ja="カードを右クリックするとコピー・削除・画像保存などの操作メニューが表示されます。" data-en="Right-click a card to access copy, delete, save image and other actions."></div>
</div>

<!-- 4. Boards -->
<div class="section" id="boards">
  <h2 class="section-title i18n" data-ja="ボード管理" data-en="Board Management"></h2>
  <p class="section-desc i18n" data-ja="複数ボードでプロジェクトを整理。" data-en="Organize your project with multiple boards."></p>

  <div class="feat-grid">
    <div class="feat-card">
      <h3 class="i18n" data-ja="ボードの追加・複製" data-en="Add & Duplicate"></h3>
      <p class="i18n" data-ja="サイドバーの＋ボタンまたは右クリックで追加。既存ボードの複製も可能。" data-en="Use the + button in sidebar or right-click to add. Existing boards can be duplicated."></p>
    </div>
    <div class="feat-card">
      <h3 class="i18n" data-ja="ボードの整理" data-en="Organize Boards"></h3>
      <p class="i18n" data-ja="右クリックで連番追加・除去、見出し追加、区切り線追加が可能。" data-en="Right-click for numbering, headings, and separator lines."></p>
    </div>
    <div class="feat-card">
      <h3 class="i18n" data-ja="ボードの色変更" data-en="Board Colors"></h3>
      <p class="i18n" data-ja="タブを右クリック→「色を変更」でボードごとに色を設定可能。" data-en="Right-click a tab and select 'Change color' to customize per board."></p>
    </div>
    <div class="feat-card">
      <h3 class="i18n" data-ja="完了チェック" data-en="Completion Check"></h3>
      <p class="i18n" data-ja="ボードタブのチェックボタンで完了マークを付けられます。" data-en="Mark boards as complete using the check button on tabs."></p>
    </div>
  </div>
</div>

<!-- 5. Shortcuts -->
<div class="section" id="shortcuts">
  <h2 class="section-title i18n" data-ja="ショートカット一覧" data-en="Keyboard Shortcuts"></h2>
  <p class="section-desc i18n" data-ja="すべてのキーボードショートカット。設定パネルからカスタマイズ可能。" data-en="All keyboard shortcuts. Customizable from the settings panel."></p>

  <h3 style="font-size:13px;color:var(--accent);margin:16px 0 8px" class="i18n" data-ja="ファイル操作" data-en="File Operations"></h3>
  <table class="sc-table">
    <tr><td><kbd>Ctrl</kbd>+<kbd>N</kbd></td><td class="i18n" data-ja="新規プロジェクト" data-en="New Project"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd>O</kbd></td><td class="i18n" data-ja="ファイルを開く" data-en="Open File"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd>S</kbd></td><td class="i18n" data-ja="上書き保存" data-en="Save"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd></td><td class="i18n" data-ja="別名で保存" data-en="Save As"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd>E</kbd></td><td class="i18n" data-ja="画像書き出し" data-en="Export Image"></td></tr>
  </table>

  <h3 style="font-size:13px;color:var(--accent);margin:16px 0 8px" class="i18n" data-ja="編集" data-en="Edit"></h3>
  <table class="sc-table">
    <tr><td><kbd>Ctrl</kbd>+<kbd>Z</kbd></td><td class="i18n" data-ja="元に戻す" data-en="Undo"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd>Y</kbd></td><td class="i18n" data-ja="やり直す" data-en="Redo"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd>C</kbd></td><td class="i18n" data-ja="コピー" data-en="Copy"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd>V</kbd></td><td class="i18n" data-ja="貼り付け" data-en="Paste"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd>A</kbd></td><td class="i18n" data-ja="全選択" data-en="Select All"></td></tr>
    <tr><td><kbd>Delete</kbd> / <kbd>BS</kbd></td><td class="i18n" data-ja="カード削除" data-en="Delete Card"></td></tr>
  </table>

  <h3 style="font-size:13px;color:var(--accent);margin:16px 0 8px" class="i18n" data-ja="カード操作" data-en="Card Operations"></h3>
  <table class="sc-table">
    <tr><td><kbd>T</kbd></td><td class="i18n" data-ja="テキストカード作成" data-en="Create Text Card"></td></tr>
    <tr><td><kbd>L</kbd></td><td class="i18n" data-ja="接続線を開始" data-en="Start Connection"></td></tr>
    <tr><td><kbd>M</kbd></td><td class="i18n" data-ja="メモウィンドウを追加" data-en="Add Memo Window"></td></tr>
    <tr><td><kbd>I</kbd></td><td class="i18n" data-ja="アイコンパレット表示" data-en="Show Icon Palette"></td></tr>
  </table>

  <h3 style="font-size:13px;color:var(--accent);margin:16px 0 8px" class="i18n" data-ja="整列（複数選択時）" data-en="Alignment (Multi-Select)"></h3>
  <table class="sc-table">
    <tr><td><kbd>Ctrl</kbd>+<kbd>↑</kbd></td><td class="i18n" data-ja="上端揃え" data-en="Align Top"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd>↓</kbd></td><td class="i18n" data-ja="下端揃え" data-en="Align Bottom"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd>←</kbd></td><td class="i18n" data-ja="左端揃え" data-en="Align Left"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd>→</kbd></td><td class="i18n" data-ja="右端揃え" data-en="Align Right"></td></tr>
  </table>

  <h3 style="font-size:13px;color:var(--accent);margin:16px 0 8px" class="i18n" data-ja="表示" data-en="View"></h3>
  <table class="sc-table">
    <tr><td><kbd>Tab</kbd> / <kbd>S</kbd></td><td class="i18n" data-ja="サイドバー開閉" data-en="Toggle Sidebar"></td></tr>
    <tr><td><kbd>Q</kbd></td><td class="i18n" data-ja="ボード名の表示切替" data-en="Toggle Board Name"></td></tr>
    <tr><td><kbd>Ctrl</kbd>+<kbd class="i18n" data-ja="ホイール" data-en="Wheel"></kbd></td><td class="i18n" data-ja="ズーム（0.3x〜3.0x）" data-en="Zoom (0.3x - 3.0x)"></td></tr>
  </table>
</div>

<!-- 6. Features -->
<div class="section" id="features">
  <h2 class="section-title i18n" data-ja="便利な機能" data-en="Useful Features"></h2>

  <div class="feat-grid">
    <div class="feat-card">
      <h3 class="i18n" data-ja="メモウィンドウ" data-en="Memo Window"></h3>
      <p class="i18n" data-ja="Mキーで作成。キャンバス上にドラッグ可能な浮遊メモ。最小化・リサイズ対応。" data-en="Press M to create. Floating draggable memo on canvas. Supports minimize and resize."></p>
    </div>
    <div class="feat-card">
      <h3 class="i18n" data-ja="アイコンパレット" data-en="Icon Palette"></h3>
      <p class="i18n" data-ja="Iキーで表示。評価・矢印・タスク・構造・記号などのアイコンをカードとして追加。" data-en="Press I to show. Add icons for ratings, arrows, tasks, structure, and symbols as cards."></p>
    </div>
    <div class="feat-card">
      <h3 class="i18n" data-ja="自動保存" data-en="Auto Save"></h3>
      <p class="i18n" data-ja="設定で間隔を指定すると自動で上書き保存。10秒〜60分まで選択可能。" data-en="Set an interval in settings for automatic saving. Choose from 10 seconds to 60 minutes."></p>
    </div>
    <div class="feat-card">
      <h3 class="i18n" data-ja="タイムスタンプバックアップ" data-en="Timestamp Backup"></h3>
      <p class="i18n" data-ja="保存時に日時付きバックアップを自動作成。保持数を設定可能（5〜30個）。" data-en="Automatically create timestamped backups on save. Set retention count (5-30)."></p>
    </div>
    <div class="feat-card">
      <h3 class="i18n" data-ja="元に戻す / やり直す" data-en="Undo / Redo"></h3>
      <p class="i18n" data-ja="最大50回まで操作を元に戻せます。Ctrl+Z / Ctrl+Y で操作。" data-en="Undo up to 50 operations. Use Ctrl+Z / Ctrl+Y."></p>
    </div>

<script>
function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.lang-btn:' + (lang === 'ja' ? 'first-child' : 'last-child')).classList.add('active');
  document.querySelectorAll('.i18n').forEach(el => {
    const text = el.getAttribute('data-' + lang);
    if (text) el.textContent = text;
  });
}

// Scroll spy: highlight active sidebar link
var sections = document.querySelectorAll('.section');
var navLinks = document.querySelectorAll('.nav-link');
document.querySelector('.main').addEventListener('scroll', updateNav);
window.addEventListener('scroll', updateNav);
function updateNav() {
  var scrollY = document.querySelector('.main').scrollTop || window.scrollY;
  sections.forEach(function(sec) {
    var top = sec.offsetTop - 100;
    var bottom = top + sec.offsetHeight;
    if (scrollY >= top && scrollY < bottom) {
      navLinks.forEach(function(a) { a.classList.remove('active'); });
      var link = document.querySelector('.nav-link[href="#' + sec.id + '"]');
      if (link) link.classList.add('active');
    }
  });
}
</script>
